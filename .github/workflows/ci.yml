name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate action pins
        run: bash .github/scripts/validate-action-pins.sh

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a226fd948759f221de0c # v5.6.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Python unit tests
        run: python -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Validate vendored benchmark data script
        run: |
          python scripts/vendor/validate_published_data.py \
            packages/comment-renderer/tests/fixtures/benchmark-data.json

      - name: Comment renderer tests
        working-directory: packages/comment-renderer
        run: npm test
