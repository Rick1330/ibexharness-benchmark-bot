name: Publish benchmark data

on:
  repository_dispatch:
    types: [benchmark_main_complete]
  workflow_dispatch:
    inputs:
      run_id:
        description: Harness Benchmarks workflow run ID
        required: true
      head_sha:
        description: Commit SHA from that run
        required: true
      run_number:
        description: Harness workflow run number (not run ID)
        required: true
      dry_run:
        description: Validate only, do not open PR
        type: boolean
        default: false

concurrency:
  group: publish-benchmark-${{ github.event.client_payload.run_id || github.event.inputs.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: publish-benchmark-data
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
    steps:
      - name: Require pinned release
        run: test -n "${{ vars.BOT_RELEASE_SHA }}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ vars.BOT_RELEASE_SHA }}
          persist-credentials: false

      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.2
        with:
          workspaces: .

      - name: Build bot
        run: cargo build --release

      - name: Verify dispatch (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          ./target/release/ibex-benchmark-bot verify-dispatch \
            --payload "$DISPATCH_PAYLOAD"

      - name: Verify dispatch (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
          DISPATCH_PAYLOAD: ${{ toJson(github.event.inputs) }}
        run: |
          ./target/release/ibex-benchmark-bot verify-dispatch \
            --payload "$DISPATCH_PAYLOAD"

      - name: Publish benchmark data PR (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          ./target/release/ibex-benchmark-bot publish \
            --payload "$DISPATCH_PAYLOAD"

      - name: Publish benchmark data PR (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
          DISPATCH_PAYLOAD: ${{ toJson(github.event.inputs) }}
        run: |
          ./target/release/ibex-benchmark-bot publish \
            --payload "$DISPATCH_PAYLOAD"

      - name: Dry run validation only
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
          DISPATCH_PAYLOAD: ${{ toJson(github.event.inputs) }}
        run: |
          ./target/release/ibex-benchmark-bot publish \
            --payload "$DISPATCH_PAYLOAD" \
            --dry-run

      - name: Workflow summary
        if: always()
        env:
          AUDIT_EVENT: ${{ github.event_name }}
          AUDIT_ACTOR: ${{ github.actor }}
          AUDIT_BOT_RELEASE_SHA: ${{ vars.BOT_RELEASE_SHA }}
          AUDIT_RUN_ID: ${{ github.event.client_payload.run_id || github.event.inputs.run_id }}
          AUDIT_HEAD_SHA: ${{ github.event.client_payload.head_sha || github.event.inputs.head_sha }}
          AUDIT_RUN_NUMBER: ${{ github.event.client_payload.run_number || github.event.inputs.run_number }}
        run: |
          {
            echo "## Benchmark publish audit"
            echo "- event: ${AUDIT_EVENT}"
            echo "- actor: ${AUDIT_ACTOR}"
            echo "- bot_release_sha: ${AUDIT_BOT_RELEASE_SHA}"
            echo "- run_id: ${AUDIT_RUN_ID}"
            echo "- head_sha: ${AUDIT_HEAD_SHA}"
            echo "- run_number: ${AUDIT_RUN_NUMBER}"
          } >> "$GITHUB_STEP_SUMMARY"
