name: Publish benchmark data

on:
  repository_dispatch:
    types: [benchmark_main_complete]
  workflow_dispatch:
    inputs:
      run_id:
        description: Harness Benchmarks workflow run ID
        required: true
      head_sha:
        description: Commit SHA from that run
        required: true
      run_number:
        description: Harness workflow run number (not run ID)
        required: true
      dry_run:
        description: Validate only, do not open PR
        type: boolean
        default: false

concurrency:
  group: publish-benchmark-${{ github.event.client_payload.run_id || github.event.inputs.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: publish-benchmark-data
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.8.2
        with:
          workspaces: .

      - name: Build bot
        run: cargo build --release

      - name: Verify dispatch (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: |
          ./target/release/ibex-benchmark-bot verify-dispatch \
            --payload '${{ toJson(github.event.client_payload) }}'

      - name: Verify dispatch (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: |
          ./target/release/ibex-benchmark-bot verify-dispatch \
            --payload '{"run_id":${{ github.event.inputs.run_id }},"head_sha":"${{ github.event.inputs.head_sha }}","run_number":${{ github.event.inputs.run_number }}}'

      - name: Publish benchmark data PR (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: |
          ./target/release/ibex-benchmark-bot publish \
            --payload '${{ toJson(github.event.client_payload) }}'

      - name: Publish benchmark data PR (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: |
          ./target/release/ibex-benchmark-bot publish \
            --payload '{"run_id":${{ github.event.inputs.run_id }},"head_sha":"${{ github.event.inputs.head_sha }}","run_number":${{ github.event.inputs.run_number }}}'

      - name: Dry run validation only
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: |
          ./target/release/ibex-benchmark-bot publish \
            --payload '{"run_id":${{ github.event.inputs.run_id }},"head_sha":"${{ github.event.inputs.head_sha }}","run_number":${{ github.event.inputs.run_number }}}' \
            --dry-run

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Benchmark publish"
            echo "- event: ${{ github.event_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
