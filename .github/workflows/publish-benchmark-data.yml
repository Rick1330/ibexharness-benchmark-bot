name: Publish benchmark data

on:
  repository_dispatch:
    types: [benchmark_main_complete]
  workflow_dispatch:
    inputs:
      run_id:
        description: Harness Benchmarks workflow run ID
        required: true
      head_sha:
        description: Commit SHA from that run
        required: true
      run_number:
        description: Harness workflow run number (not run ID)
        required: true
      dry_run:
        description: Validate only, do not open PR
        type: boolean
        default: false

concurrency:
  group: publish-benchmark-${{ github.event.client_payload.run_id || github.event.inputs.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: publish-benchmark-data
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Require pinned release
        run: test -n "${{ vars.BOT_RELEASE_SHA }}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ vars.BOT_RELEASE_SHA }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.8.2
        with:
          workspaces: .

      - name: Build bot
        run: cargo build --release

      - name: Verify dispatch (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: |
          ./target/release/ibex-benchmark-bot verify-dispatch \
            --payload '${{ toJson(github.event.client_payload) }}'

      - name: Verify dispatch (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: |
          ./target/release/ibex-benchmark-bot verify-dispatch \
            --payload '${{ toJson(github.event.inputs) }}'

      - name: Publish benchmark data PR (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: |
          ./target/release/ibex-benchmark-bot publish \
            --payload '${{ toJson(github.event.client_payload) }}'

      - name: Publish benchmark data PR (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: |
          ./target/release/ibex-benchmark-bot publish \
            --payload '${{ toJson(github.event.inputs) }}'

      - name: Dry run validation only
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
        run: |
          ./target/release/ibex-benchmark-bot publish \
            --payload '${{ toJson(github.event.inputs) }}' \
            --dry-run

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Benchmark publish audit"
            echo "- event: ${{ github.event_name }}"
            echo "- actor: ${{ github.actor }}"
            echo "- bot_release_sha: ${{ vars.BOT_RELEASE_SHA }}"
            echo "- run_id: ${{ github.event.client_payload.run_id || github.event.inputs.run_id }}"
            echo "- head_sha: ${{ github.event.client_payload.head_sha || github.event.inputs.head_sha }}"
            echo "- run_number: ${{ github.event.client_payload.run_number || github.event.inputs.run_number }}"
          } >> "$GITHUB_STEP_SUMMARY"
